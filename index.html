<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTD HİDROLİK PNÖMATİK</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 360px;
            width: 90%;
            margin: 20px auto;
        }
        .logo-img {
            width: 140px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        h1 {
            color: #1a1a1a;
            font-size: 20px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .section-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            font-weight: 700;
        }
        /* Buton yapısı ikonlarla daha hizalı olması için güncellendi */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn:hover {
            opacity: 0.9;
        }
        
        /* Buton Renkleri */
        .btn-call { background-color: #007bff; }       
        .btn-call-2 { background-color: #0069d9; }     
        .btn-whatsapp { background-color: #25D366; } /* Yeni Eklenen WhatsApp Rengi */
        .btn-web { background-color: #343a40; }         
        .btn-instagram { background-color: #e1306c; }  
        
        /* CK Plast Footer Alanı */
        .footer-wrapper {
            margin-top: 30px;
            border-top: 1px dashed #eee; 
            padding-top: 15px;
        }
        .legal-footer {
            font-size: 11px;
            color: #999;
            font-weight: 500;
            margin-bottom: 3px;
        }
        .creator-tag {
            font-size: 10px; 
            color: #ccc; 
            text-decoration: none; 
            display: inline-block;
        }
        .creator-tag span {
            font-weight: 700; 
            color: #999; 
        }
    </style>
</head>
<body>

<div class="container">
    <img src="BTD HİDROLİK LOGO.png" alt="BTD HİDROLİK LOGO" class="logo-img">
    
    <h1>BTD HİDROLİK PNÖMATİK</h1>
    <p>Sızdırmazlık Elemanları</p>
    
    <div class="section-title">📍 Ali Bilici</div>
    
    <a href="tel:+905072922146" class="btn btn-call">📞 ALİ BİLİCİ Ara</a>
    <a href="https://wa.me/905072922146?text=Merhaba,%20BTD%20Hidrolik'ten%20bilgi%20almak%20istiyorum." target="_blank" class="btn btn-whatsapp">💬 WhatsApp'tan Yaz</a>
    
    <div class="section-title">📍 Tahir Tunçer</div>
    
    <a href="tel:+905348620380" class="btn btn-call-2">📞 TAHİR TUNÇER Ara</a>
    <a href="https://wa.me/905348620380?text=Merhaba,%20BTD%20Hidrolik'ten%20bilgi%20almak%20istiyorum." target="_blank" class="btn btn-whatsapp">💬 WhatsApp'tan Yaz</a>
    
    <div class="section-title">🌐 Bizi Takip Edin</div>
    
    <a href="https://www.btdhidrolik.com.tr/" target="_blank" class="btn btn-web">🌐 Web Sitemiz</a>
    
    <a href="https://www.instagram.com/btdhidrolik.gaziantep?igsh=NWozYmlzd2J0Yzk4" target="_blank" class="btn btn-instagram">📸 Instagram Profilimiz</a>
    
    <div class="footer-wrapper">
        <div class="legal-footer">© 2026 BTD Hidrolik Pnömatik</div>
        <a href="#" target="_blank" class="creator-tag">Dijital Kart Tasarımı: <span>CK Plast</span></a>
    </div>
</div>

</body>
</html>
