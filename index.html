<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTD HİDROLİK PNÖMATİK</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 360px;
            width: 90%;
            margin: 20px auto;
        }
        .logo-img {
            width: 140px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        h1 {
            color: #1a1a1a;
            font-size: 20px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        .btn {
            display: block;
            color: white;
            text-decoration: none;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn:hover {
            opacity: 0.9;
        }
        /* Buton Renkleri */
        .btn-call { background-color: #007bff; }       /* Telefon 1 */
        .btn-web { background-color: #343a40; }        /* Web Sitesi */
        .btn-instagram { background-color: #e1306c; }  /* Instagram */
    </style>
</head>
<body>

<div class="container">
    <!-- Düzenlenen logo satırı -->
    <img src="BTD HİDROLİK LOGO.png" alt="BTD HİDROLİK LOGO" class="logo-img">
    
    <h1>BTD HİDROLİK PNÖMATİK</h1>
    <p>Sızdırmazlık Elemanları</p>
    
    <div class="section-title">Hızlı İletişim</div>
    
    <!-- Link biçimi sorunsuz çalışacak şekilde güncellendi -->
    <a href="tel:+905072922146" class="btn btn-call">Yetkili Ara</a>
    
    <div class="section-title">Bizi Takip Edin</div>
    
    <a href="https://www.btdhidrolik.com.tr/" target="_blank" class="btn btn-web">Web Sitemiz</a>
    
    <a href="https://www.instagram.com/btdhidrolik.gaziantep?igsh=NWozYmlzd2J0Yzk4" target="_blank" class="btn btn-instagram">Instagram Profilimiz</a>
</div>

</body>
</html>
